const MAX_FILE_SIZE = 10 * 1024 * 1024;
async function sendMessage(chatId, chatType, text, fileData = null, fileType = null) {
    if (!text && !fileData) return;
    const msg = { from: currentUser, text: text || "", timestamp: Date.now(), file: fileData ? { data: fileData, type: fileType } : null };
    if (chatType === 'global') await db.ref('globalMessages').push(msg);
    else if (chatType === 'user') await db.ref('privateMessages/' + chatId).push(msg);
    if (settings.sound) playNotificationSound();
}
function listenMessages(chatType, chatId, callback) {
    let ref = chatType === 'global' ? db.ref('globalMessages') : db.ref('privateMessages/' + chatId);
    ref.on('value', snap => callback(snap.val() ? Object.values(snap.val()) : []));
}
function uploadFile(callback) {
    const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*,video/*,application/pdf,.doc,.docx,.gif,audio/*';
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > MAX_FILE_SIZE) { alert("Файл > 10 МБ"); return; }
        const reader = new FileReader();
        reader.onload = (ev) => callback(ev.target.result, file.type);
        reader.readAsDataURL(file);
    };
    input.click();
}
let mediaRecorder, audioChunks;
async function startVoiceRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = (ev) => { if (currentDialog && currentDialogType) sendMessage(currentDialog, currentDialogType, "", ev.target.result, 'audio'); else sendGlobalMessageWithFile(ev.target.result, 'audio'); };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(track => track.stop());
        };
        mediaRecorder.start();
        alert("🔴 Запись... Нажмите ОК для остановки");
        setTimeout(() => { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 30000);
    } catch(e) { alert("Микрофон не доступен"); }
}

    setTimeout(() => { if (splash && splash.parentNode) splash.remove(); document.getElementById('app').style.display = 'flex'; const savedTheme = localStorage.getItem('theme') || 'dark'; document.body.className = savedTheme; showLoginModal(); if (onlineInterval) clearInterval(onlineInterval); onlineInterval = setInterval(() => { if (currentUser) updateOnlineStatus(); }, 30000); }, 800);
}, 5000);
</script>
