<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Anti Max — с NavalnyStar и ANTI CLOUD</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; transition: background 0.2s; }
        body.light { background: #e6e8ec; }
        body.dark { background: #0a0a0a; }
        .app { width: 100%; max-width: 1400px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        body.light .app { background: #ffffff; }
        body.dark .app { background: #17212b; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid; transition: 0.2s; }
        body.light .header { border-color: #ddd; background: #fff; }
        body.dark .header { border-color: #242f3d; background: #17212b; }
        .logo { font-size: 22px; font-weight: bold; background: linear-gradient(45deg, #ff416c, #ff4b2b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-info { display: flex; gap: 12px; align-items: center; }
        .premium-badge { background: linear-gradient(135deg, #FFD700, #FFA500); color: #1a1a2e; border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: bold; margin-left: 8px; }
        .star-balance { background: #2b2f38; border-radius: 20px; padding: 4px 12px; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .tg-btn { background: transparent; border: none; padding: 6px 12px; border-radius: 18px; cursor: pointer; transition: 0.1s; }
        body.light .tg-btn { color: #0088cc; }
        body.dark .tg-btn { color: #6ab3f3; }
        .tabs { display: flex; padding: 0 16px; gap: 8px; border-bottom: 1px solid; overflow-x: auto; }
        body.light .tabs { border-color: #ddd; background: #fff; }
        body.dark .tabs { border-color: #242f3d; background: #17212b; }
        .tab { padding: 12px 16px; cursor: pointer; font-weight: 500; white-space: nowrap; }
        body.light .tab { color: #555; }
        body.dark .tab { color: #8392a1; }
        .tab.active { color: #6ab3f3; border-bottom: 2px solid #6ab3f3; }
        .main-panel { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; border-right: 1px solid; overflow-y: auto; }
        body.light .sidebar { background: #f8f9fa; border-color: #ddd; }
        body.dark .sidebar { background: #17212b; border-color: #242f3d; }
        .sidebar-header { padding: 14px 16px; font-weight: 600; }
        .contact-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; border-radius: 12px; margin: 2px 8px; }
        body.light .contact-item:hover { background: #e9ecef; }
        body.dark .contact-item:hover { background: #242f3d; }
        .contact-item.active { background: #2b5278; }
        .contact-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #2c3e50; display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; position: relative; }
        .contact-name { flex: 1; font-weight: 500; }
        .premium-icon { font-size: 14px; margin-left: 4px; }
        .add-contact { padding: 12px; display: flex; gap: 8px; border-top: 1px solid; }
        .add-contact input { flex: 1; padding: 8px 12px; border-radius: 20px; border: none; outline: none; }
        body.light .add-contact input { background: #fff; border: 1px solid #ccc; }
        body.dark .add-contact input { background: #242f3d; color: #fff; }
        .add-contact button { background: #6ab3f3; border: none; padding: 0 16px; border-radius: 20px; cursor: pointer; color: #17212b; font-weight: bold; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid; }
        body.light .chat-header { background: #fff; border-color: #ddd; }
        body.dark .chat-header { background: #17212b; border-color: #242f3d; }
        .messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 70%; padding: 8px 12px; border-radius: 18px; animation: fadeInUp 0.2s; }
        .message-mine { align-self: flex-end; background: #2b5278; color: white; border-bottom-right-radius: 4px; }
        .message-other { align-self: flex-start; background: #17212b; color: #e0e0e0; border-bottom-left-radius: 4px; }
        .message-sender { font-size: 11px; opacity: 0.7; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .message-text { font-size: 14px; }
        .message-time { font-size: 10px; text-align: right; margin-top: 4px; opacity: 0.6; }
        .input-area { padding: 12px 16px; display: flex; gap: 12px; align-items: center; border-top: 1px solid; }
        body.light .input-area { border-color: #ddd; background: #fff; }
        body.dark .input-area { border-color: #242f3d; background: #17212b; }
        .input-area input { flex: 1; padding: 10px 14px; border-radius: 24px; border: none; outline: none; }
        body.light .input-area input { background: #f0f0f0; color: #000; }
        body.dark .input-area input { background: #242f3d; color: #fff; }
        .input-area button { background: #6ab3f3; border: none; padding: 0 20px; border-radius: 24px; cursor: pointer; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(4px); }
        .modal-content { background: #17212b; border-radius: 28px; padding: 24px; width: 360px; text-align: center; color: white; max-height: 80%; overflow-y: auto; }
        .setting-item { margin: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .gift-item, .premium-item { background: #242f3d; border-radius: 16px; padding: 12px; margin: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .gift-item:hover, .premium-item:hover { background: #2b5278; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div id="splash" class="splash" style="position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg,#1a1a2e,#16213e); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10000; color:white; transition:opacity 1s;">
    <h1 style="font-size:64px; background:linear-gradient(45deg,#ff416c,#ff4b2b); -webkit-background-clip:text; background-clip:text; color:transparent;">Anti Max</h1>
    <p style="font-size:20px;">лучшее решение</p>
</div>
<div id="app" style="display: none;"></div>

<script>
// ========== FIREBASE ==========
const firebaseConfig = {
    apiKey: "AIzaSyDYMrTNblBRXUsZoAa30JeSfGgfkXG4-P0",
    authDomain: "animax-8a0d3.firebaseapp.com",
    databaseURL: "https://animax-8a0d3-default-rtdb.firebaseio.com",
    projectId: "animax-8a0d3",
    storageBucket: "animax-8a0d3.firebasestorage.app",
    messagingSenderId: "514071748113",
    appId: "1:514071748113:web:4808891bacf94293d65bb0"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = null;
let isAdmin = false;
let currentTab = "global";
let currentContact = null;
let globalUnsub = null, privateUnsub = null;

// ========== ДАННЫЕ ПОЛЬЗОВАТЕЛЯ ==========
async function initUserData(login) {
    const snap = await db.ref('users/' + login).once('value');
    if (!snap.exists()) return;
    let data = snap.val();
    if (data.stars === undefined) await db.ref('users/' + login + '/stars').set(0);
    if (data.premium === undefined) await db.ref('users/' + login + '/premium').set(false);
    if (data.premiumExpiry === undefined) await db.ref('users/' + login + '/premiumExpiry').set(0);
    if (data.gifts === undefined) await db.ref('users/' + login + '/gifts').set([]);
}
async function getUserStars(login) {
    const snap = await db.ref('users/' + login + '/stars').once('value');
    return snap.val() || 0;
}
async function addStars(login, amount) {
    const current = await getUserStars(login);
    await db.ref('users/' + login + '/stars').set(current + amount);
}
async function deductStars(login, amount) {
    const current = await getUserStars(login);
    if (current >= amount) await db.ref('users/' + login + '/stars').set(current - amount);
    else return false;
    return true;
}
async function isPremium(login) {
    const snap = await db.ref('users/' + login + '/premium').once('value');
    const expiry = await db.ref('users/' + login + '/premiumExpiry').once('value');
    if (snap.val() === true && expiry.val() > Date.now()) return true;
    if (expiry.val() < Date.now()) await db.ref('users/' + login + '/premium').set(false);
    return false;
}
async function buyPremium(login, months) {
    const cost = months * 100; // 100 звезд за месяц
    if (await deductStars(login, cost)) {
        const expiry = await db.ref('users/' + login + '/premiumExpiry').once('value');
        let newExpiry = Math.max(expiry.val() || 0, Date.now()) + months * 30 * 24 * 60 * 60 * 1000;
        await db.ref('users/' + login + '/premium').set(true);
        await db.ref('users/' + login + '/premiumExpiry').set(newExpiry);
        return true;
    }
    return false;
}
async function buyGift(login, giftId, price) {
    if (await deductStars(login, price)) {
        const gifts = (await db.ref('users/' + login + '/gifts').once('value')).val() || [];
        gifts.push({ id: giftId, timestamp: Date.now() });
        await db.ref('users/' + login + '/gifts').set(gifts);
        return true;
    }
    return false;
}
// Фейковая реклама (+5 звезд)
async function watchAd() {
    await addStars(currentUser, 5);
    alert("+5 NavalnyStar! Спасибо за просмотр рекламы.");
}

// ========== ОСТАЛЬНЫЕ ФУНКЦИИ ПОЛЬЗОВАТЕЛЕЙ (сокращённо) ==========
async function registerUser(login, password) {
    if (await db.ref('users/' + login).once('value').then(s => s.exists())) return "Логин занят";
    await db.ref('users/' + login).set({ password, role: "user", banned: false, avatar: "😀", avatarBase64: null, stars: 0, premium: false, premiumExpiry: 0, gifts: [] });
    return "OK";
}
async function loginUser(login, password) {
    const snap = await db.ref('users/' + login).once('value');
    if (!snap.exists()) return "Пользователь не найден";
    const u = snap.val();
    if (u.password !== password) return "Неверный пароль";
    if (u.banned) return "Аккаунт заблокирован";
    await initUserData(login);
    return "OK";
}
async function getUserData(login) {
    const snap = await db.ref('users/' + login).once('value');
    return snap.val() || { avatar: "😀", avatarBase64: null, premium: false };
}
async function getContacts(login) {
    const snap = await db.ref('users/' + login + '/contacts').once('value');
    return snap.val() || [];
}
async function addContact(login, contactLogin) {
    if (login === contactLogin) return "Нельзя себя";
    if (!(await db.ref('users/' + contactLogin).once('value')).exists()) return "Пользователь не найден";
    let contacts = await getContacts(login);
    if (contacts.includes(contactLogin)) return "Уже в контактах";
    contacts.push(contactLogin);
    await db.ref('users/' + login + '/contacts').set(contacts);
    return "OK";
}
async function updateUserAvatar(login, emoji, base64) {
    await db.ref('users/' + login).update({ avatar: emoji, avatarBase64: base64 || null });
}
async function setUserBan(login, banned) { await db.ref('users/' + login + '/banned').set(banned); }
async function getAllUsers() {
    const snap = await db.ref('users').once('value');
    const u = snap.val() || {};
    return Object.keys(u).map(k => ({ login: k, ...u[k] }));
}
async function deleteGlobalMessage(key) { await db.ref('globalMessages/' + key).remove(); }
async function getAllGlobalMessagesWithKeys() {
    const snap = await db.ref('globalMessages').once('value');
    const val = snap.val();
    return val ? Object.entries(val).map(([k, m]) => ({ key: k, ...m })) : [];
}
async function sendGlobalMessage(text) {
    if (!currentUser) return;
    if ((await db.ref('users/' + currentUser + '/banned').once('value')).val()) { alert("Вы заблокированы"); return; }
    if (!text.trim()) return;
    await db.ref('globalMessages').push({ from: currentUser, text: text.trim(), timestamp: Date.now() });
}
async function sendPrivateMessage(to, text) {
    if (!currentUser) return;
    if ((await db.ref('users/' + currentUser + '/banned').once('value')).val()) { alert("Вы заблокированы"); return; }
    if (!text.trim()) return;
    const chatId = [currentUser, to].sort().join('_');
    await db.ref('privateMessages/' + chatId).push({ from: currentUser, to, text: text.trim(), timestamp: Date.now() });
}
function listenGlobalMessages(cb) { db.ref('globalMessages').on('value', snap => cb(snap.val() ? Object.values(snap.val()) : [])); }
function listenPrivateMessages(otherUser, cb) {
    const chatId = [currentUser, otherUser].sort().join('_');
    db.ref('privateMessages/' + chatId).on('value', snap => cb(snap.val() ? Object.values(snap.val()) : []));
}

// ========== НАСТРОЙКИ С РАСШИРЕННЫМИ ФУНКЦИЯМИ ==========
async function showSettingsModal() {
    const stars = await getUserStars(currentUser);
    const premiumActive = await isPremium(currentUser);
    const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content">
            <h3>⚙️ Настройки</h3>
            <div class="setting-item"><span>🌙 Тема:</span> <select id="themeSelect"><option value="dark">Тёмная</option><option value="light">Светлая</option></select></div>
            <div class="setting-item"><span>🔔 Звуки:</span> <input type="checkbox" id="soundToggle" checked></div>
            <div class="setting-item"><span>📱 Параллакс фон:</span> <input type="checkbox" id="parallaxToggle"></div>
            <div class="setting-item"><span>💬 Анимированные сообщения:</span> <input type="checkbox" id="animMsgToggle" checked></div>
            <hr>
            <h3>⭐ NavalnyStar: ${stars}</h3>
            <button id="watchAdBtn" class="tg-btn">📺 Смотреть рекламу (+5 звезд)</button>
            <hr>
            <h3>🎁 Подарки (купить за звезды)</h3>
            <div id="giftsList"></div>
            <hr>
            <h3>☁️ ANTI CLOUD Premium</h3>
            <div id="premiumInfo"></div>
            <button id="closeSettings" class="tg-btn">Закрыть</button>
        </div>
    `;
    document.body.appendChild(modal);
    // Тема
    document.getElementById('themeSelect').value = document.body.classList.contains('dark') ? 'dark' : 'light';
    document.getElementById('themeSelect').onchange = (e) => { document.body.className = e.target.value; localStorage.setItem('theme', e.target.value); };
    document.getElementById('watchAdBtn').onclick = async () => { await watchAd(); modal.remove(); showSettingsModal(); };
    // Подарки
    const gifts = [
        { id: 'flower', name: '🌹 Цветок', price: 20 },
        { id: 'cake', name: '🎂 Торт', price: 50 },
        { id: 'ring', name: '💍 Кольцо', price: 150 },
        { id: 'rocket', name: '🚀 Ракета', price: 300 }
    ];
    const giftsDiv = document.getElementById('giftsList');
    giftsDiv.innerHTML = gifts.map(g => `<div class="gift-item" data-id="${g.id}" data-price="${g.price}">${g.name} — ${g.price} ⭐ <button class="buy-gift">Купить</button></div>`).join('');
    document.querySelectorAll('.buy-gift').forEach((btn, idx) => {
        btn.onclick = async (e) => {
            e.stopPropagation();
            const gift = gifts[idx];
            if (await buyGift(currentUser, gift.id, gift.price)) alert(`Вы купили ${gift.name}! Подарок сохранён.`);
            else alert("Недостаточно звезд!");
            modal.remove(); showSettingsModal();
        };
    });
    // Premium
    const premiumDiv = document.getElementById('premiumInfo');
    if (premiumActive) {
        const expiry = await db.ref('users/' + currentUser + '/premiumExpiry').once('value');
        premiumDiv.innerHTML = `<div class="premium-item">✨ У вас ANTI CLOUD Premium до ${new Date(expiry.val()).toLocaleDateString()}</div>`;
    } else {
        premiumDiv.innerHTML = `
            <div class="premium-item" data-months="1">Купить на 1 месяц — 100 ⭐</div>
            <div class="premium-item" data-months="3">Купить на 3 месяца — 250 ⭐ (скидка)</div>
            <div class="premium-item" data-months="6">Купить на 6 месяцев — 450 ⭐</div>
        `;
        document.querySelectorAll('.premium-item').forEach(el => {
            el.onclick = async () => {
                const months = parseInt(el.dataset.months);
                if (await buyPremium(currentUser, months)) alert(`Поздравляем! Вы купили ANTI CLOUD Premium на ${months} месяц(ев)!`);
                else alert("Недостаточно звезд!");
                modal.remove(); showSettingsModal();
            };
        });
    }
    document.getElementById('closeSettings').onclick = () => modal.remove();
}

// ========== ПРОФИЛЬ С ОТОБРАЖЕНИЕМ PREMIUM ==========
async function showProfileModal() {
    const data = await getUserData(currentUser);
    const premium = await isPremium(currentUser);
    const stars = await getUserStars(currentUser);
    const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content">
            <h3>Профиль ${premium ? '<span style="background:linear-gradient(135deg,#FFD700,#FFA500); padding:2px 8px; border-radius:20px;">☁️ ANTI CLOUD</span>' : ''}</h3>
            <div id="profileAvatar">${data.avatarBase64 ? `<img src="${data.avatarBase64}" style="width:100px;border-radius:50%;">` : `<div style="font-size:80px;">${data.avatar}</div>`}</div>
            <div>⭐ Баланс: ${stars} NavalnyStar</div>
            <label class="file-input-label" style="background:#6ab3f3; padding:8px 16px; border-radius:24px; cursor:pointer; display:inline-block; margin:8px;">📸 Загрузить фото<input type="file" id="avatarFile" accept="image/*" style="display:none;"></label>
            <div>Выберите эмодзи:</div>
            <div class="avatar-select" style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin:16px 0;">
                ${["😀","😎","🥷","🐱","🐶","🦊","🐼","🤖"].map(e => `<div style="font-size:40px; cursor:pointer; background:#242f3d; border-radius:50%; padding:8px;" data-emoji="${e}">${e}</div>`).join('')}
            </div>
            <button id="saveProfile" class="tg-btn">Сохранить</button>
            <button id="closeProfile" class="tg-btn">Закрыть</button>
        </div>
    `;
    document.body.appendChild(modal);
    let selectedEmoji = data.avatar, selectedBase64 = data.avatarBase64;
    document.getElementById('avatarFile').onchange = (e) => {
        const file = e.target.files[0];
        if (file) { const reader = new FileReader(); reader.onload = (ev) => { selectedBase64 = ev.target.result; document.getElementById('profileAvatar').innerHTML = `<img src="${selectedBase64}" style="width:100px;border-radius:50%;">`; }; reader.readAsDataURL(file); }
    };
    document.querySelectorAll('.avatar-select div').forEach(opt => {
        opt.onclick = () => { selectedEmoji = opt.dataset.emoji; document.getElementById('profileAvatar').innerHTML = `<div style="font-size:80px;">${selectedEmoji}</div>`; selectedBase64 = null; };
    });
    document.getElementById('saveProfile').onclick = async () => { await updateUserAvatar(currentUser, selectedEmoji, selectedBase64); alert("Аватар обновлён"); modal.remove(); if(currentTab === 'contacts') renderContactsTab(); };
    document.getElementById('closeProfile').onclick = () => modal.remove();
}

// ========== UI (общий чат, контакты, админка) ==========
async function renderGlobalChat() {
    const panel = document.getElementById('mainPanel');
    panel.innerHTML = `<div class="chat-area"><div class="chat-header">🌐 Общий чат</div><div class="messages-container" id="globalMessages"></div><div class="input-area"><input type="text" id="globalInput" placeholder="Сообщение..."><button id="globalSend">➤</button></div></div>`;
    if (globalUnsub) globalUnsub();
    globalUnsub = listenGlobalMessages(msgs => {
        const container = document.getElementById('globalMessages');
        if (!container) return;
        container.innerHTML = msgs.map(m => `<div class="message ${m.from === currentUser ? 'message-mine' : 'message-other'}"><div class="message-sender">${escapeHtml(m.from)}</div><div class="message-text">${escapeHtml(m.text)}</div><div class="message-time">${new Date(m.timestamp).toLocaleTimeString()}</div></div>`).join('');
        container.scrollTop = container.scrollHeight;
    });
    document.getElementById('globalSend').onclick = () => { const inp = document.getElementById('globalInput'); sendGlobalMessage(inp.value); inp.value = ''; };
}

async function renderContactsTab() {
    const contacts = await getContacts(currentUser);
    const premium = await isPremium(currentUser);
    const panel = document.getElementById('mainPanel');
    panel.innerHTML = `
        <div class="sidebar">
            <div class="sidebar-header">Контакты</div>
            <div id="contactsList"></div>
            <div class="add-contact"><input id="newContact" placeholder="Логин"><button id="addContactBtn">➕</button></div>
        </div>
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-header-avatar" id="chatAvatar">👤</div>
                <div><div id="chatName">Выберите чат</div><div id="chatStatus"></div></div>
            </div>
            <div class="messages-container" id="privateMessages"></div>
            <div class="input-area"><input type="text" id="privateInput" placeholder="Сообщение..." disabled><button id="privateSend" disabled>➤</button></div>
        </div>
    `;
    const contactsDiv = document.getElementById('contactsList');
    contactsDiv.innerHTML = '';
    for (let c of contacts) {
        const ud = await getUserData(c);
        const userPremium = await isPremium(c);
        const avatarHtml = ud.avatarBase64 ? `<img src="${ud.avatarBase64}" style="width:48px;height:48px;border-radius:50%;">` : `<div style="width:48px;height:48px;border-radius:50%;background:#2c3e50;display:flex;align-items:center;justify-content:center;font-size:24px;">${ud.avatar}</div>`;
        const div = document.createElement('div'); div.className = `contact-item ${currentContact === c ? 'active' : ''}`;
        div.innerHTML = `<div class="contact-avatar">${avatarHtml}</div><div class="contact-name">${escapeHtml(c)}${userPremium ? ' <span class="premium-icon">☁️</span>' : ''}</div>`;
        div.onclick = () => { currentContact = c; renderContactsTab(); };
        contactsDiv.appendChild(div);
    }
    document.getElementById('addContactBtn').onclick = async () => {
        const inp = document.getElementById('newContact');
        const res = await addContact(currentUser, inp.value.trim());
        if (res !== "OK") alert(res); else { inp.value = ''; renderContactsTab(); }
    };
    if (currentContact) {
        document.getElementById('privateInput').disabled = false;
        document.getElementById('privateSend').disabled = false;
        const ud = await getUserData(currentContact);
        document.getElementById('chatName').innerHTML = `${escapeHtml(currentContact)} ${await isPremium(currentContact) ? '☁️' : ''}`;
        document.getElementById('chatStatus').innerText = "В сети";
        document.getElementById('chatAvatar').innerHTML = ud.avatarBase64 ? `<img src="${ud.avatarBase64}" style="width:42px;border-radius:50%;">` : `<div style="font-size:28px;">${ud.avatar}</div>`;
        if (privateUnsub) privateUnsub();
        privateUnsub = listenPrivateMessages(currentContact, msgs => {
            const container = document.getElementById('privateMessages');
            if (!container) return;
            container.innerHTML = msgs.map(msg => `<div class="message ${msg.from === currentUser ? 'message-mine' : 'message-other'}"><div class="message-sender">${escapeHtml(msg.from)}</div><div class="message-text">${escapeHtml(msg.text)}</div><div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div></div>`).join('');
            container.scrollTop = container.scrollHeight;
        });
        const send = () => { const inp = document.getElementById('privateInput'); if (inp.value.trim()) { sendPrivateMessage(currentContact, inp.value); inp.value = ''; } };
        document.getElementById('privateSend').onclick = send;
        document.getElementById('privateInput').addEventListener('keypress', e => { if (e.key === 'Enter') send(); });
    }
}

async function renderAdminPanel() {
    const panel = document.getElementById('mainPanel');
    panel.innerHTML = `<div class="chat-area"><div class="chat-header">👑 Админ-панель</div><div class="messages-container" id="adminContent"></div></div>`;
    const container = document.getElementById('adminContent');
    const users = await getAllUsers();
    container.innerHTML = '<h3>Управление пользователями</h3>';
    for (let u of users) {
        const row = document.createElement('div'); row.className = 'user-row'; row.style.display = 'flex'; row.style.justifyContent = 'space-between'; row.style.padding = '8px'; row.style.background = '#242f3d'; row.style.margin = '4px'; row.style.borderRadius = '12px';
        row.innerHTML = `<div><strong>${escapeHtml(u.login)}</strong> ${u.banned ? '🔴' : '🟢'} ⭐${u.stars || 0} ${u.premium ? '☁️' : ''}</div>
                         <div><button class="ban-btn" data-login="${u.login}" data-ban="${!u.banned}">${u.banned ? 'Разблокировать' : 'Заблокировать'}</button></div>`;
        container.appendChild(row);
    }
    document.querySelectorAll('.ban-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            await setUserBan(btn.dataset.login, btn.dataset.ban === 'true');
            renderAdminPanel();
        });
    });
    const globalMsgs = await getAllGlobalMessagesWithKeys();
    container.innerHTML += '<h3 style="margin-top:20px">Сообщения общего чата</h3>';
    for (let msg of globalMsgs) {
        const row = document.createElement('div'); row.className = 'user-row'; row.style.display = 'flex'; row.style.justifyContent = 'space-between'; row.style.padding = '8px'; row.style.background = '#242f3d'; row.style.margin = '4px';
        row.innerHTML = `<div><strong>${escapeHtml(msg.from)}</strong>: ${escapeHtml(msg.text)}</div><button class="delete-msg-btn" data-key="${msg.key}">🗑</button>`;
        container.appendChild(row);
    }
    document.querySelectorAll('.delete-msg-btn').forEach(btn => {
        btn.addEventListener('click', async () => { if (confirm("Удалить?")) await deleteGlobalMessage(btn.dataset.key); renderAdminPanel(); });
    });
}

function renderApp() {
    const appDiv = document.getElementById('app');
    appDiv.innerHTML = `
        <div class="app">
            <div class="header">
                <div class="logo">Anti Max</div>
                <div class="user-info">
                    <div class="star-balance" id="starBalance">⭐ 0</div>
                    <button class="tg-btn" id="settingsBtn">⚙️</button>
                    <button class="tg-btn" id="profileBtn">👤</button>
                    <button class="tg-btn" id="logoutBtn">🚪</button>
                </div>
            </div>
            <div class="tabs" id="tabsContainer"></div>
            <div class="main-panel" id="mainPanel"></div>
        </div>
    `;
    const tabs = [{ id: "global", name: "🌐 Общий чат" }, { id: "contacts", name: "💬 Контакты" }];
    if (isAdmin) tabs.push({ id: "admin", name: "👑 Админ" });
    document.getElementById('tabsContainer').innerHTML = tabs.map(t => `<div class="tab ${currentTab === t.id ? 'active' : ''}" data-tab="${t.id}">${t.name}</div>`).join('');
    document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
    document.getElementById('settingsBtn').onclick = () => showSettingsModal();
    document.getElementById('profileBtn').onclick = () => showProfileModal();
    document.getElementById('logoutBtn').onclick = logout;
    updateStarBalance();
    if (currentTab === 'global') renderGlobalChat();
    else if (currentTab === 'contacts') renderContactsTab();
    else if (currentTab === 'admin' && isAdmin) renderAdminPanel();
}
async function updateStarBalance() {
    const bal = await getUserStars(currentUser);
    const el = document.getElementById('starBalance');
    if (el) el.innerHTML = `⭐ ${bal}`;
}
async function switchTab(tab) {
    currentTab = tab;
    if (globalUnsub) globalUnsub();
    if (privateUnsub) privateUnsub();
    renderApp();
}
async function logout() {
    if (globalUnsub) globalUnsub();
    if (privateUnsub) privateUnsub();
    currentUser = null; isAdmin = false;
    showLoginModal();
}
function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

// ========== ВХОД ==========
async function initAdmin() {
    const snap = await db.ref('users/admin').once('value');
    if (!snap.exists()) await db.ref('users/admin').set({ password: "2505", role: "admin", banned: false, avatar: "👑", stars: 0, premium: false, premiumExpiry: 0 });
}
function showLoginModal() {
    const modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex';
    modal.innerHTML = `<div class="modal-content"><h2>Anti Max</h2><input type="text" id="loginName" placeholder="Логин"><input type="password" id="loginPass" placeholder="Пароль"><button id="doLogin">Войти</button><button id="toReg">Регистрация</button><div id="loginError" style="color:red"></div></div>`;
    document.body.appendChild(modal);
    document.getElementById('doLogin').onclick = async () => {
        const login = document.getElementById('loginName').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        if (login === 'admin' && pass === '2505') {
            await initAdmin();
            currentUser = 'admin'; isAdmin = true;
            modal.remove(); document.getElementById('app').style.display = 'flex'; renderApp(); return;
        }
        const res = await loginUser(login, pass);
        if (res === "OK") { currentUser = login; isAdmin = false; modal.remove(); document.getElementById('app').style.display = 'flex'; renderApp(); }
        else document.getElementById('loginError').innerText = res;
    };
    document.getElementById('toReg').onclick = async () => {
        const login = document.getElementById('loginName').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        const res = await registerUser(login, pass);
        alert(res === "OK" ? "Регистрация успешна! Теперь войдите." : res);
    };
}

// Запуск с заставкой 5 сек
setTimeout(() => {
    const splash = document.getElementById('splash');
    if (splash) splash.style.opacity = '0';
    setTimeout(() => {
        if (splash) splash.remove();
        document.getElementById('app').style.display = 'flex';
        initAdmin().then(() => showLoginModal());
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) document.body.className = savedTheme;
        else document.body.className = 'dark';
    }, 1000);
}, 5000);
</script>
