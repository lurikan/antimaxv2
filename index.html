async function initSpecialUsers() {
    const adminSnap = await db.ref('users/admin').once('value');

async function getUserData(login) { const snap = await db.ref('users/' + login).once('value'); return snap.val() || { avatar: "😀", stars: 0, role: "user", online: false, lastSeen: 0 }; }
async function getContacts(login) { const snap = await db.ref('users/' + login + '/contacts').once('value'); return snap.val() || []; }
async function addContact(login, contactLogin) {
    if (login === contactLogin) return "Нельзя себя";
    if (!(await db.ref('users/' + contactLogin).once('value')).exists()) return "Не найден";
    let contacts = await getContacts(login);
    if (contacts.includes(contactLogin)) return "Уже есть";
    contacts.push(contactLogin);
    await db.ref('users/' + login + '/contacts').set(contacts);
    return "OK";
}
async function registerUser(login, password) {
    if (await db.ref('users/' + login).once('value').then(s=>s.exists())) return "Логин занят";
    await db.ref('users/' + login).set({ password, role: "user", avatar: "😀", stars: 0 });
    return "OK";
}
async function loginUser(login, password) {
    const snap = await db.ref('users/' + login).once('value');
    if (!snap.exists()) return "Не найден";
    if (snap.val().password !== password) return "Неверный пароль";
    if (snap.val().banned) return "Заблокирован";
    await db.ref('users/' + login + '/online').set(true);
    await db.ref('users/' + login + '/lastSeen').set(Date.now());
    return "OK";
}
async function updateOnlineStatus() { if (currentUser) { await db.ref('users/' + currentUser + '/online').set(true); await db.ref('users/' + currentUser + '/lastSeen').set(Date.now()); } }
async function getUserStatus(login) {
    const snap = await db.ref('users/' + login).once('value');
    const data = snap.val();
    if (!data) return "неизвестно";
    if (data.online) return "🟢 онлайн";
    const last = data.lastSeen || 0;
    if (!last) return "давно";
    const diff = Date.now() - last;
    if (diff < 60000) return "только что";
    if (diff < 3600000) return `${Math.floor(diff/60000)} мин назад`;
    return `${Math.floor(diff/3600000)} ч назад`;
}
function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

// ========== ЗВЁЗДЫ, МАГАЗИН, PREMIUM ==========
async function getUserStars(login) { const snap = await db.ref('users/' + login + '/stars').once('value'); return snap.val() || 0; }
async function addStars(login, amount) { const cur = await getUserStars(login); await db.ref('users/' + login + '/stars').set(cur + amount); }
async function isPremium(login) {
    const snap = await db.ref('users/' + login + '/premium').once('value');
    const expiry = await db.ref('users/' + login + '/premiumExpiry').once('value');
    if (snap.val() === true && expiry.val() > Date.now()) return true;
    if (expiry.val() < Date.now()) await db.ref('users/' + login + '/premium').set(false);
    return false;
}
async function buyPremium(login, months) {
    const cost = months * 100;
    const stars = await getUserStars(login);
    if (stars < cost) return false;
    await addStars(login, -cost);
    const expiry = await db.ref('users/' + login + '/premiumExpiry').once('value');
    let newExpiry = Math.max(expiry.val() || 0, Date.now()) + months * 30 * 24 * 60 * 60 * 1000;
    await db.ref('users/' + login + '/premium').set(true);
    await db.ref('users/' + login + '/premiumExpiry').set(newExpiry);
    return true;
}

// Создаём отдельный чат с ботом-тестером для создателя
async function initTesterBot() {
    const botLogin = "Тестер (бот)";
    const botSnap = await db.ref('users/' + botLogin).once('value');
    if (!botSnap.exists()) {
        await db.ref('users/' + botLogin).set({ password: "bot123", role: "bot", avatar: "🤖", stars: 0 });

}
async function openTesterChat() {
    if (currentRole !== 'creator') { alert("Только для создателя!"); return; }
    await initTesterBot();
    const botLogin = "Тестер (бот)";
    currentChat = [currentUser, botLogin].sort().join('_');
    currentChatType = 'user';

    document.getElementById('privateInput').disabled = false;

    if (privateUnsub) privateUnsub();

        if (!container) return;
        container.innerHTML = msgs.map(m => `<div class="message ${m.from === currentUser ? 'message-mine' : 'message-other'}"><div class="message-sender">${escapeHtml(m.from)}</div><div class="message-text">${m.file ? (m.file.type.startsWith('image/') ? `<img src="${m.file.data}" style="max-width:200px; border-radius:12px;">` : (m.file.type.startsWith('audio/') ? `<audio controls src="${m.file.data}"></audio>` : `<a href="${m.file.data}" download>📎 Файл</a>`)) : escapeHtml(m.text)}</div><div class="message-time">${new Date(m.timestamp).toLocaleTimeString()}</div></div>`).join('');
        container.scrollTop = container.scrollHeight;

    // Отправляем приветственное сообщение
    setTimeout(async () => {

// ========== ОСТАЛЬНЫЕ ФУНКЦИИ (СООБЩЕНИЯ, ФАЙЛЫ, АУДИО/ВИДЕО) ==========
const MAX_FILE_SIZE = 10 * 1024 * 1024;
async function sendMessage(chatId, chatType, text, fileData = null, fileType = null) {
    if (!text && !fileData) return;
    const msg = { from: currentUser, text: text || "", timestamp: Date.now(), file: fileData ? { data: fileData, type: fileType } : null };
    if (chatType === 'global') await db.ref('globalMessages').push(msg);
    else if (chatType === 'user') await db.ref('privateMessages/' + chatId).push(msg);
    if (settings.sound) playNotificationSound();
}
function listenMessages(chatType, chatId, callback) {
    let ref = chatType === 'global' ? db.ref('globalMessages') : db.ref('privateMessages/' + chatId);
    ref.on('value', snap => callback(snap.val() ? Object.values(snap.val()) : []));
}
function uploadFile(callback) {
    const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*,video/*,application/pdf,.doc,.docx,.gif,audio/*';
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > MAX_FILE_SIZE) { alert("Файл > 10 МБ"); return; }
        const reader = new FileReader();
        reader.onload = (ev) => callback(ev.target.result, file.type);
        reader.readAsDataURL(file);
    };
    input.click();
}
let mediaRecorder, audioChunks;
async function startVoiceRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = (ev) => { if (currentChat && currentChatType) sendMessage(currentChat, currentChatType, "", ev.target.result, 'audio'); else sendGlobalMessageWithFile(ev.target.result, 'audio'); };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(track => track.stop());
        };
        mediaRecorder.start();
        alert("🔴 Запись... Нажмите ОК для остановки");
        setTimeout(() => { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 30000);
    } catch(e) { alert("Микрофон не доступен"); }
}

    if (lower.includes('шутка')) return 'Почему программисты путают Хэллоуин и Рождество? Потому что 31 Oct = 25 Dec!';
